<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
    <div>CRYPTO MATRIX</div>
    <div class="menu">
        <a href="index.html">Dashboard</a>
        <a href="trade.html">Trade</a>
    </div>
</div>

<div class="grid">

    <div class="panel">
        <div class="panel-title">MARKETS</div>
        BTC/USDT<br>
        ETH/USDT<br>
        SOL/USDT
    </div>

    <div class="panel">
        <div class="panel-title">CHART</div>
        <iframe 
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT"
        style="width:100%; height:90%; border:none;">
        </iframe>
    </div>

    <div class="panel">
        <div class="panel-title">ORDER BOOK</div>
        Sell<br>68000<br>67900<br><br>
        Buy<br>67800<br>67700
    </div>

    <div class="panel">
        <div class="panel-title">BOTS</div>
        RSI: ON
    </div>

    <div class="panel">
        <div class="panel-title">TRADE</div>
        <input id="symbol" placeholder="BTCUSDT"><br><br>
        <input id="amount" placeholder="Amount"><br><br>

        <button class="buy" onclick="buy()">BUY</button>
        <button class="sell" onclick="sell()">SELL</button>
    </div>

    <div class="panel">
        <div class="panel-title">LOGS</div>
        <div id="logs"></div>
    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
